<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KC INTERNATIONAL 통합경영관리시스템</title>
<style>
/* ══════════ THEME TOKENS ══════════ */
:root{
  --r:3px; --mono:"Consolas","D2Coding",ui-monospace,monospace;
  --ff:"Pretendard","맑은 고딕",-apple-system,sans-serif;
}
[data-theme="dark"]{
  --bg:#0d1117; --panel:#151b23; --panel2:#1c232c; --head:#0a0e14; --line:#242c38; --line2:#2f3945;
  --tx:#e6edf3; --tx2:#adbac7; --tx3:#6e7d8f; --tx4:#495866;
  --acc:#4a9eff; --acc2:#1f6feb; --accbg:#132238;
  --ok:#3fb950; --okbg:#0f2417; --warn:#d29922; --warnbg:#241c0c; --err:#f85149; --errbg:#2b1113;
  --pos:#3fb950; --neg:#f85149; --grid:#1e2632; --sel:#1a2532; --hov:#1a222c;
  --c1:#4a9eff;--c2:#3fb950;--c3:#d29922;--c4:#a371f7;--c5:#f778ba;--c6:#39c5cf;--c7:#f85149;--c8:#6e7d8f;
}
[data-theme="light"]{
  --bg:#eef1f5; --panel:#fff; --panel2:#f6f8fa; --head:#fff; --line:#dde2e8; --line2:#cdd5dd;
  --tx:#1f2328; --tx2:#4b5563; --tx3:#818b98; --tx4:#a8b1bb;
  --acc:#0969da; --acc2:#0550ae; --accbg:#ddf0ff;
  --ok:#1a7f37; --okbg:#e6f6ea; --warn:#9a6700; --warnbg:#fff8e5; --err:#cf222e; --errbg:#ffebe9;
  --pos:#1a7f37; --neg:#cf222e; --grid:#e8ecf1; --sel:#ddf0ff; --hov:#f2f5f8;
  --c1:#0969da;--c2:#1a7f37;--c3:#bf8700;--c4:#8250df;--c5:#bf3989;--c6:#0e7490;--c7:#cf222e;--c8:#818b98;
}
[data-theme="blue"]{
  --bg:#071a2e; --panel:#0d2942; --panel2:#123a58; --head:#041526; --line:#1a4568; --line2:#245a85;
  --tx:#e2f0fb; --tx2:#a8c9e3; --tx3:#6a94b8; --tx4:#476e8f;
  --acc:#3fbaf3; --acc2:#0d8ecf; --accbg:#0c3a5c;
  --ok:#2ec4a6; --okbg:#0a3a35; --warn:#f0b429; --warnbg:#3a2f0c; --err:#ff6b6b; --errbg:#3d1a1e;
  --pos:#2ec4a6; --neg:#ff6b6b; --grid:#16405f; --sel:#0f3a5a; --hov:#123a58;
  --c1:#3fbaf3;--c2:#2ec4a6;--c3:#f0b429;--c4:#8b7ff5;--c5:#f57ec1;--c6:#4dd0e1;--c7:#ff6b6b;--c8:#6a94b8;
}
[data-theme="green"]{
  --bg:#f2f7f2; --panel:#fff; --panel2:#eef5ee; --head:#fff; --line:#d5e3d5; --line2:#bcd4bc;
  --tx:#16281c; --tx2:#3f5c47; --tx3:#6f8a77; --tx4:#9ab0a1;
  --acc:#1f7a4a; --acc2:#155c37; --accbg:#dff2e6;
  --ok:#1f7a4a; --okbg:#dff2e6; --warn:#9a6700; --warnbg:#fff5dd; --err:#c2352f; --errbg:#fdeceb;
  --pos:#1f7a4a; --neg:#c2352f; --grid:#e2ece3; --sel:#dff2e6; --hov:#eaf3ea;
  --c1:#1f7a4a;--c2:#4c9f70;--c3:#c48b16;--c4:#5b7fc7;--c5:#a35bb0;--c6:#12867f;--c7:#c2352f;--c8:#8aa392;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font:12px/1.45 var(--ff);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:5px}
::-webkit-scrollbar-track{background:transparent}
::selection{background:var(--acc);color:#fff}

/* ══════════ TOP BAR ══════════ */
#top{height:38px;background:var(--head);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 8px;gap:2px}
#top .bi{display:flex;align-items:center;gap:7px;padding:0 12px 0 4px;margin-right:6px;border-right:1px solid var(--line)}
#top .bi i{width:22px;height:22px;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;
  font:800 9px var(--mono);font-style:normal;border-radius:var(--r)}
#top .bi b{font-size:12px;letter-spacing:-.2px}
#top .bi span{font-size:9px;color:var(--tx4);margin-left:2px}
.mnu{padding:6px 11px;font-size:12px;color:var(--tx2);cursor:pointer;border-radius:var(--r);white-space:nowrap;user-select:none}
.mnu:hover{background:var(--hov);color:var(--tx)}
.mnu.on{background:var(--accbg);color:var(--acc);font-weight:700}
#top .rt{margin-left:auto;display:flex;align-items:center;gap:6px}
.thm{display:flex;gap:2px;background:var(--panel2);padding:2px;border-radius:var(--r);border:1px solid var(--line)}
.thm b{width:20px;height:18px;border-radius:2px;cursor:pointer;border:1px solid transparent;display:block}
.thm b.on{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc)}
.usr{display:flex;align-items:center;gap:6px;padding:3px 9px 3px 4px;background:var(--panel2);border:1px solid var(--line);border-radius:var(--r);cursor:pointer}
.usr i{width:19px;height:19px;border-radius:2px;background:var(--acc);color:#fff;display:flex;align-items:center;
  justify-content:center;font:700 9px var(--mono);font-style:normal}
.usr b{font-size:11px}.usr span{font-size:9px;color:var(--tx4)}
.per{display:flex;align-items:center;gap:0;background:var(--panel2);border:1px solid var(--line);border-radius:var(--r)}
.per input{background:transparent;border:0;color:var(--tx2);font:11px var(--mono);padding:4px 3px;outline:none;width:88px;color-scheme:dark}
[data-theme="light"] .per input,[data-theme="green"] .per input{color-scheme:light}
.per span{color:var(--tx4);font-size:10px}
.per button{background:transparent;border:0;border-left:1px solid var(--line);color:var(--tx3);font:10px var(--ff);
  padding:5px 7px;cursor:pointer}
.per button:hover{color:var(--acc)}
.per button.on{color:var(--acc);background:var(--accbg)}

/* ══════════ LAYOUT ══════════ */
#body{display:flex;height:calc(100vh - 38px - 22px)}
#side{width:186px;flex:none;background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:5px 0}
#side .st{padding:7px 10px 4px;font:700 9px var(--ff);color:var(--tx4);letter-spacing:.8px}
#side a{display:flex;align-items:center;padding:5px 10px 5px 18px;font-size:11.5px;color:var(--tx2);cursor:pointer;
  border-left:2px solid transparent;user-select:none;position:relative}
#side a:before{content:"";position:absolute;left:9px;top:11px;width:3px;height:3px;background:var(--tx4);border-radius:50%}
#side a:hover{background:var(--hov);color:var(--tx)}
#side a.on{background:var(--sel);color:var(--acc);border-left-color:var(--acc);font-weight:700}
#side a.on:before{background:var(--acc)}
#side a em{margin-left:auto;font:700 9px var(--mono);color:var(--tx4);font-style:normal;
  background:var(--panel2);padding:0 4px;border-radius:2px}
#side a.wn em{background:var(--err);color:#fff}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#tabs{height:29px;background:var(--panel2);border-bottom:1px solid var(--line);display:flex;align-items:flex-end;
  padding:0 4px;gap:1px;overflow-x:auto;flex:none}
#tabs::-webkit-scrollbar{height:0}
.tab{display:flex;align-items:center;gap:6px;padding:5px 8px 5px 10px;font-size:11.5px;color:var(--tx3);
  background:transparent;cursor:pointer;border:1px solid transparent;border-bottom:0;white-space:nowrap;
  border-radius:var(--r) var(--r) 0 0}
.tab:hover{color:var(--tx2);background:var(--hov)}
.tab.on{background:var(--bg);color:var(--tx);border-color:var(--line);font-weight:700}
.tab x{color:var(--tx4);font-size:13px;line-height:1;padding:0 1px}
.tab x:hover{color:var(--err)}
#view{flex:1;overflow:auto;padding:10px}
#status{height:22px;background:var(--head);border-top:1px solid var(--line);display:flex;align-items:center;
  padding:0 10px;gap:14px;font:10px var(--mono);color:var(--tx4)}
#status b{color:var(--tx2);font-weight:400}
#status .dot{width:6px;height:6px;border-radius:50%;background:var(--ok);display:inline-block;margin-right:4px}
#status .rt{margin-left:auto;display:flex;gap:12px}
#status kbd{background:var(--panel2);border:1px solid var(--line);border-radius:2px;padding:0 4px;color:var(--tx3);font-size:9px}

/* ══════════ COMPONENTS ══════════ */
.pg{display:none}.pg.on{display:block}
.hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.hd h1{font-size:14px;margin:0;font-weight:700;letter-spacing:-.2px}
.hd .pth{font:10px var(--mono);color:var(--tx4)}
.hd .rt{margin-left:auto;display:flex;gap:5px}
.box{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);margin-bottom:9px}
.box>h2{margin:0;padding:7px 10px;font-size:11.5px;font-weight:700;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:7px;background:var(--panel2);border-radius:var(--r) var(--r) 0 0}
.box>h2 .tg{margin-left:auto;font:10px var(--mono);color:var(--tx4);font-weight:400}
.box .bd{padding:10px}
.box .bd.p0{padding:0}
.row{display:flex;gap:9px}.row>*{min-width:0}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:9px}
.mb{margin-bottom:9px}

.k{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:8px 10px;cursor:pointer;position:relative;overflow:hidden}
.k:hover{border-color:var(--acc)}
.k:after{content:"";position:absolute;inset:0 auto 0 0;width:2px;background:var(--acc)}
.k.g:after{background:var(--ok)} .k.r:after{background:var(--err)} .k.w:after{background:var(--warn)}
.k.p:after{background:var(--c4)} .k.c:after{background:var(--c6)} .k.n:after{background:var(--tx4)}
.k .l{font-size:10px;color:var(--tx3);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.k .v{font:800 17px var(--mono);letter-spacing:-.5px}
.k .v u{font:600 10px var(--ff);color:var(--tx3);text-decoration:none;margin-left:1px}
.k .d{font:10px var(--mono);color:var(--tx4);margin-top:2px}
.k .d .up{color:var(--pos)}.k .d .dn{color:var(--neg)}

table.t{width:100%;border-collapse:collapse;font-size:11.5px}
table.t th{text-align:left;padding:5px 7px;font:700 9.5px var(--ff);color:var(--tx4);letter-spacing:.3px;
  background:var(--panel2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:2;white-space:nowrap;cursor:pointer;user-select:none}
table.t th:hover{color:var(--acc)}
table.t th.n,table.t td.n{text-align:right;font-family:var(--mono)}
table.t th.c,table.t td.c{text-align:center}
table.t td{padding:4px 7px;border-bottom:1px solid var(--grid);color:var(--tx2);white-space:nowrap}
table.t tbody tr{cursor:pointer}
table.t tbody tr:hover td{background:var(--hov)}
table.t tbody tr.sel td{background:var(--sel)}
table.t tfoot td{background:var(--panel2);border-top:1px solid var(--line2);font-weight:700;color:var(--tx);position:sticky;bottom:0}
.sc{overflow:auto;max-height:420px}
.sc.h2{max-height:calc(100vh - 250px)}
.sc.h3{max-height:300px}
.m{font-family:var(--mono)}
.a{font:700 11.5px var(--mono)}
.pos{color:var(--pos)}.neg{color:var(--neg)}.dim{color:var(--tx4)}
.p{display:inline-block;padding:1px 6px;border-radius:2px;font:700 9.5px var(--ff);white-space:nowrap}
.p.ok{background:var(--okbg);color:var(--ok)} .p.er{background:var(--errbg);color:var(--err)}
.p.wa{background:var(--warnbg);color:var(--warn)} .p.ac{background:var(--accbg);color:var(--acc)}
.p.nn{background:var(--panel2);color:var(--tx3);border:1px solid var(--line)}
.tag{display:inline-block;padding:0 5px;border-radius:2px;font:10px var(--mono);background:var(--panel2);
  color:var(--tx3);border:1px solid var(--line)}

.btn{border:1px solid var(--line2);background:var(--panel2);color:var(--tx2);padding:4px 10px;border-radius:var(--r);
  font:600 11px var(--ff);cursor:pointer;white-space:nowrap}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.pri{background:var(--acc);border-color:var(--acc);color:#fff}
.btn.pri:hover{background:var(--acc2);color:#fff}
.btn.dg{color:var(--err);border-color:var(--line2)}
.btn.dg:hover{border-color:var(--err);background:var(--errbg)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn kbd{opacity:.6;font-size:9px;margin-left:3px}
label.f{display:block;font-size:10px;color:var(--tx3);margin-bottom:2px}
.i{width:100%;background:var(--bg);border:1px solid var(--line2);color:var(--tx);border-radius:var(--r);
  padding:4px 7px;font:11.5px var(--ff);outline:none}
.i:focus{border-color:var(--acc);box-shadow:0 0 0 2px var(--accbg)}
.i:read-only{background:var(--panel2);color:var(--tx3)}
.i.n{text-align:right;font-family:var(--mono)}
select.i{cursor:pointer}
.fg{margin-bottom:7px}
.ck{width:12px;height:12px;accent-color:var(--acc);cursor:pointer}
.al{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:var(--r);font-size:11px;margin-bottom:8px}
.al.e{background:var(--errbg);color:var(--err);border:1px solid var(--err)}
.al.w{background:var(--warnbg);color:var(--warn);border:1px solid var(--warn)}
.al.i{background:var(--accbg);color:var(--acc);border:1px solid var(--acc)}
.al .btn{margin-left:auto}
.bar{height:5px;background:var(--grid);border-radius:3px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:3px}
.emp{padding:22px;text-align:center;color:var(--tx4);font-size:11px}
svg.ch{width:100%;display:block;overflow:visible}
.gl{fill:var(--tx4);font:9px var(--mono)}
.vl{fill:var(--tx3);font:700 9px var(--mono)}
.bx{cursor:pointer}.bx:hover{opacity:.75}
.lg{display:flex;gap:10px;flex-wrap:wrap;font-size:10px;color:var(--tx3);margin-top:6px}
.lg i{width:8px;height:8px;border-radius:1px;display:inline-block;margin-right:3px}
#tst{position:fixed;right:12px;bottom:30px;display:flex;flex-direction:column;gap:5px;z-index:99}
.ts{background:var(--panel);border:1px solid var(--line2);border-left:3px solid var(--ok);padding:7px 12px;
  border-radius:var(--r);font-size:11.5px;box-shadow:0 6px 20px rgba(0,0,0,.35);color:var(--tx)}
.ts.e{border-left-color:var(--err)}
#mdl{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100}
#mdl.on{display:flex}
.mw{background:var(--panel);border:1px solid var(--line2);border-radius:5px;width:640px;max-height:82vh;overflow:auto;
  box-shadow:0 24px 60px rgba(0,0,0,.5)}
.mw h3{margin:0;padding:10px 13px;font-size:13px;border-bottom:1px solid var(--line);display:flex;align-items:center}
.mw h3 x{margin-left:auto;cursor:pointer;color:var(--tx4);font-size:16px}
.mw h3 x:hover{color:var(--err)}
.mw .mb2{padding:13px}
.dl{display:grid;grid-template-columns:110px 1fr;gap:3px 10px;font-size:11.5px}
.dl dt{color:var(--tx4)}.dl dd{margin:0;color:var(--tx);font-family:var(--mono)}
.ln{display:grid;grid-template-columns:1.5fr .7fr .8fr 1.1fr .8fr .9fr .9fr 22px;gap:3px;align-items:center;margin-bottom:3px}
.ln .h{font:700 9px var(--ff);color:var(--tx4)}
.xb{background:transparent;border:1px solid var(--line);color:var(--tx4);border-radius:2px;cursor:pointer;height:24px;font-size:12px}
.xb:hover{color:var(--err);border-color:var(--err)}
.flow{display:flex;align-items:center;gap:0;font-size:10px}
.flow i{padding:2px 7px;background:var(--panel2);border:1px solid var(--line);color:var(--tx4);font-style:normal}
.flow i:first-child{border-radius:2px 0 0 2px}
.flow i:last-child{border-radius:0 2px 2px 0}
.flow i.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:700}
.flow i.dn{background:var(--okbg);border-color:var(--ok);color:var(--ok)}
</style>
</head>

<body>
<div id="top">
  <div class="bi"><i>KC</i><b>KC INTERNATIONAL</b><span>통합경영관리</span><span style="background:var(--warnbg);color:var(--warn);padding:1px 5px;border-radius:2px;font:700 9px var(--ff);margin-left:4px">DEMO</span></div>
  <div id="mnu"></div>
  <div class="rt">
    <div class="per">
      <button data-p="m">당월</button><button data-p="q">분기</button><button data-p="y">당해</button>
      <button data-p="a" class="on">전체</button>
      <input type="date" id="f1"><span>~</span><input type="date" id="f2">
    </div>
    <div class="thm">
      <b data-t="dark"  style="background:#0d1117" title="다크"></b>
      <b data-t="light" style="background:#eef1f5" title="라이트"></b>
      <b data-t="blue"  style="background:#0d2942" title="블루"></b>
      <b data-t="green" style="background:#dff2e6" title="그린"></b>
    </div>
    <div class="usr" onclick="P.user()"><i id="ui">김</i><div><b id="un">김명규</b> <span id="ur">관리자</span></div></div>
  </div>
</div>

<div id="body">
  <div id="side"></div>
  <div id="main">
    <div id="tabs"></div>
    <div id="view"></div>
  </div>
</div>

<div id="status">
  <span><i class="dot"></i><b id="stDb">SQLite · 로컬</b></span>
  <span>전표 <b id="stV">-</b></span>
  <span>거래처 <b id="stC">-</b></span>
  <span>마감 <b id="stM">-</b></span>
  <span id="stW"></span>
  <div class="rt">
    <span><kbd>F2</kbd> 조회</span><span><kbd>F8</kbd> 저장</span><span><kbd>F9</kbd> 신규</span>
    <span><kbd>Ctrl+K</kbd> 검색</span><span id="stT">-</span>
  </div>
</div>

<div id="tst"></div>

function RS(){return R().filter(s=>s.appr!=='반려'&&s.flow==='매출확정');}
function RE(){const a=F1(),b=F2();return EX.filter(x=>x.date>=a&&x.date<=b);}
function RR(){const a=F1(),b=F2();return RC.filter(r=>r.date>=a&&r.date<=b);}
function agg(L,f){const m=new Map();L.forEach(r=>{const k=f(r);if(k==null)return;
  const o=m.get(k)||{k,v:0,n:0,p:0,c:0,d:0};o.v+=r.amt;o.n++;o.p+=r.profit||0;o.c+=r.cost||0;o.d+=r.disc_a||0;m.set(k,o);});
  return[...m.values()];}
function cust(n){return CU.find(c=>c.name===n||c.code===n||c.alias.includes(n));}
function sim(a,b){a=a.replace(/[\s()]/g,'');b=b.replace(/[\s()]/g,'');
  const s=new Set(a.split('')),t=new Set(b.split(''));let i=0;s.forEach(x=>{if(t.has(x))i++;});
  return i/Math.max(s.size,t.size,1);}

/* ─── FIFO ─── */
function fifoQ(pc){return LT.filter(l=>l.pcode===pc).sort((a,b)=>a.arrive<b.arrive?-1:1);}
function fifoPeek(pc,q){const L=fifoQ(pc);let n=q,c=0,u=[];
  for(const l of L){if(n<=0)break;const t=Math.min(n,Math.max(0,l.left));if(t>0){c+=t*l.unit;n-=t;u.push({l:l.lot,q:t,u:l.unit});}}
  return{cost:Math.round(c),used:u,short:n};}
function fifoTake(pc,q,ref,dt){const L=fifoQ(pc);let n=q,c=0,u=[];
  for(const l of L){if(n<=0)break;const t=Math.min(n,Math.max(0,l.left));
    if(t>0){l.left-=t;c+=t*l.unit;n-=t;u.push({l:l.lot,q:t,u:l.unit});}}
  if(n>0){const s=PS[pc].std_cost;c+=n*s;u.push({l:'재고부족',q:n,u:s});}
  return{cost:Math.round(c),used:u,short:n};}
(function(){[...SV].sort((a,b)=>a.date<b.date?-1:1).forEach(s=>{
  if(s.qty&&fifoQ(s.pcode).length){const f=fifoTake(s.pcode,s.qty,s.no,s.date);s.cost=f.cost;s.profit=s.amt-f.cost;s.lots=f.used.map(x=>x.l).join(',');}
  else{s.cost=null;s.profit=0;s.lots='';}});})();

function stockOf(pc){const L=fifoQ(pc);const i=L.reduce((a,l)=>a+l.qty,0),f=L.reduce((a,l)=>a+Math.max(0,l.left),0);
  return{in:i,left:f,out:i-f,val:L.reduce((a,l)=>a+Math.max(0,l.left)*l.unit,0)};}
function invSnap(){const a=F1(),b=F2();
  const bb=LT.filter(l=>l.arrive<a).reduce((s,l)=>s+l.total,0);
  const cb=SV.filter(s=>s.date<a&&s.cost).reduce((s,x)=>s+x.cost,0);
  const op=Math.max(0,bb-cb);
  const buy=LT.filter(l=>l.arrive>=a&&l.arrive<=b).reduce((s,l)=>s+l.total,0);
  const cg=RS().reduce((s,x)=>s+(x.cost||0),0);
  return{op,buy,cogs:cg,close:Math.max(0,op+buy-cg),phy:LT.reduce((s,l)=>s+Math.max(0,l.left)*l.unit,0)};}
function pl(){const S=RS(),X=RE(),iv=invSnap();
  const rev=S.reduce((a,r)=>a+r.amt,0);
  const sga=X.filter(x=>!COGS.includes(x.acct)).reduce((a,x)=>a+x.amt,0);
  return{rev,cogs:iv.cogs,iv,gp:rev-iv.cogs,sga,op:rev-iv.cogs-sga,S,X};}

/* ═══════════ CHARTS ═══════════ */
function bar(el,d,o={}){
  const W=o.w||760,H=o.h||190,P={l:o.pl||54,r:o.line?40:10,t:14,b:22},iw=W-P.l-P.r,ih=H-P.t-P.b;
  if(!d.length){el.innerHTML='<div class="emp">데이터 없음</div>';return;}
  const mx=Math.max(...d.map(x=>Math.max(x.v,x.v2||0)))||1,g=iw/d.length,bw=Math.min(o.bw||30,g*.62);
  let s=`<svg class="ch" viewBox="0 0 ${W} ${H}">`;
  for(let i=0;i<=4;i++){const y=P.t+ih*i/4;
    s+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="var(--grid)"/>
        <text class="gl" x="${P.l-5}" y="${y+3}" text-anchor="end">${e(mx*(1-i/4))}</text>`;}
  d.forEach((x,i)=>{const bx=P.l+g*i+(g-bw)/2,h=Math.max(1,ih*Math.max(0,x.v)/mx),y=P.t+ih-h;
    s+=`<rect class="bx" x="${bx}" y="${y}" width="${bw}" height="${h}" fill="${o.c||'var(--c1)'}" ${o.cb?`onclick="${o.cb}('${esc(x.k)}')"`:''}><title>${x.k}: ${w(x.v)}</title></rect>`;
    if(x.v2){const h2=ih*Math.max(0,x.v2)/mx;
      s+=`<rect x="${bx+bw*.5}" y="${P.t+ih-h2}" width="${bw*.5}" height="${h2}" fill="var(--c2)"><title>${w(x.v2)}</title></rect>`;}
    if(d.length<=24||i%Math.ceil(d.length/20)===0)
      s+=`<text class="gl" x="${P.l+g*i+g/2}" y="${H-6}" text-anchor="middle">${String(x.k).length>7?String(x.k).slice(-6):x.k}</text>`;
    if(o.val&&d.length<=13&&x.v>0)s+=`<text class="vl" x="${P.l+g*i+g/2}" y="${y-3}" text-anchor="middle">${e(x.v)}</text>`;});
  if(o.line){const t=d.reduce((a,x)=>a+x.v,0)||1;let c=0;
    const pt=d.map((x,i)=>{c+=x.v;return[P.l+g*i+g/2,P.t+ih-ih*(c/t)];});
    s+=`<polyline fill="none" stroke="var(--c3)" stroke-width="1.5" points="${pt.map(p=>p.join(',')).join(' ')}"/>`;
    pt.forEach(p=>s+=`<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="var(--panel)" stroke="var(--c3)" stroke-width="1.5"/>`);
    for(let i=0;i<=4;i++)s+=`<text class="gl" x="${W-P.r+5}" y="${P.t+ih*i/4+3}">${100-i*25}%</text>`;}
  el.innerHTML=s+'</svg>';
}
function multi(el,d,ser,o={}){
  const W=760,H=o.h||210,P={l:56,r:10,t:14,b:22},iw=W-P.l-P.r,ih=H-P.t-P.b;
  if(!d.length){el.innerHTML='<div class="emp">데이터 없음</div>';return;}
  const mx=Math.max(...d.flatMap(x=>ser.map(s=>Math.abs(x[s[0]]||0))))||1;
  const g=iw/d.length,bw=Math.min(11,g/(ser.length+1.3));
  let s=`<svg class="ch" viewBox="0 0 ${W} ${H}">`;
  for(let i=0;i<=4;i++){const y=P.t+ih*i/4;
    s+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="var(--grid)"/>
        <text class="gl" x="${P.l-5}" y="${y+3}" text-anchor="end">${e(mx*(1-i/4))}</text>`;}
  d.forEach((x,i)=>{const x0=P.l+g*i+g/2-bw*ser.length/2;
    ser.forEach(([k,c,n],j)=>{const v=x[k]||0,h=Math.max(1,ih*Math.abs(v)/mx);
      s+=`<rect class="bx" x="${x0+j*(bw+1)}" y="${P.t+ih-h}" width="${bw}" height="${h}" fill="${v<0?'var(--err)':c}"><title>${x.k} ${n}: ${w(v)}</title></rect>`;});
    s+=`<text class="gl" x="${P.l+g*i+g/2}" y="${H-6}" text-anchor="middle">${x.k}</text>`;});
  el.innerHTML=s+'</svg><div class="lg">'+ser.map(([k,c,n])=>`<span><i style="background:${c}"></i>${n}</span>`).join('')+'</div>';
}
function hb(el,d,fmt){const mx=Math.max(...d.map(x=>x.v))||1;
  el.innerHTML=d.map((x,i)=>`<div style="margin-bottom:7px">
    <div style="display:flex;font-size:11px;margin-bottom:2px">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%">${x.k}</span>
      <span class="a" style="margin-left:auto;color:${CC[i%8]}">${fmt?fmt(x):e(x.v)}</span></div>
    <div class="bar"><i style="width:${Math.max(1,x.v/mx*100)}%;background:${CC[i%8]}"></i></div></div>`).join('')||'<div class="emp">없음</div>';}
function donut(el,d){const R0=52,r=33,K=64,t=d.reduce((a,x)=>a+x.v,0)||1;let a0=-Math.PI/2;
  let s=`<svg class="ch" viewBox="0 0 128 128" style="max-width:140px;margin:0 auto">`;
  d.forEach((x,i)=>{const a1=a0+2*Math.PI*x.v/t,bg=(a1-a0)>Math.PI?1:0,p=(rr,a)=>[K+rr*Math.cos(a),K+rr*Math.sin(a)];
    const[x1,y1]=p(R0,a0),[x2,y2]=p(R0,a1),[x3,y3]=p(r,a1),[x4,y4]=p(r,a0);
    s+=`<path class="bx" d="M${x1},${y1} A${R0},${R0} 0 ${bg} 1 ${x2},${y2} L${x3},${y3} A${r},${r} 0 ${bg} 0 ${x4},${y4} Z" fill="${CC[i%8]}" stroke="var(--panel)" stroke-width="1.5"><title>${x.k}: ${w(x.v)}</title></path>`;a0=a1;});
  s+=`<text x="${K}" y="${K+3}" text-anchor="middle" style="font:800 11px var(--mono)" fill="var(--tx)">${e(t)}</text></svg>`;
  s+='<div style="margin-top:8px">'+d.map((x,i)=>`<div style="display:flex;gap:5px;font-size:10.5px;margin:3px 0;align-items:center">
    <i style="width:7px;height:7px;background:${CC[i%8]};flex:none;border-radius:1px"></i>
    <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${x.k}</span>
    <span class="m dim" style="margin-left:auto">${(x.v/t*100).toFixed(1)}%</span></div>`).join('')+'</div>';
  el.innerHTML=s;}
function spark(d,c){const W=90,H=20,mx=Math.max(...d)||1,mn=Math.min(...d,0);
  const p=d.map((v,i)=>`${i/(d.length-1||1)*W},${H-(v-mn)/((mx-mn)||1)*H}`).join(' ');
  return `<svg width="${W}" height="${H}" style="display:block"><polyline fill="none" stroke="${c||'var(--acc)'}" stroke-width="1.2" points="${p}"/></svg>`;}

const P={
  grp(g){GRP=g;const f=M.find(x=>x.id===g).s[0][0];P.open(f);},
  open(i){if(!TITLE[i])return;
    if(!TAB.includes(i)){TAB.push(i);if(TAB.length>9)TAB.shift();}
    CUR=i;GRP=M.find(g=>g.s.some(s=>s[0]===i)).id;
    drawMenu();drawTabs();P.render();},
  shut(i){TAB=TAB.filter(x=>x!==i);if(CUR===i)CUR=TAB[TAB.length-1]||null;

  render(){const f=PG[CUR];

function listGo(){

    <td class="n ${s.profit>0?'pos':'dim'}">${s.cost?w(s.profit):'-'}</td>
    <td class="n ${mg!==null&&mg<15?'neg':'pos'}">${mg===null?'-':mg.toFixed(1)+'%'}</td>
    <td><span class="p ${s.flow==='매출확정'?'ac':'nn'}">${s.flow}</span></td>

  $('#lc').textContent=`${w(L.length)}건${L.length>500?' (500 표시)':''} / 전체 ${w(SV.length)}건`;

function arCore(b,onlyLate){
  const U=SV.filter(isOpen).filter(s=>!onlyLate||dd(s.date,TODAY)>30);
  const G={'0-30':[],'31-60':[],'61-90':[],'90+':[]};U.forEach(s=>G[ageOf(s.date)].push(s));
  const tot=U.reduce((a,s)=>a+balOf(s),0)||1;
  const M=new Map();
  U.forEach(s=>{const o=M.get(s.cust)||{k:s.cust,rg:s.region,'0-30':0,'31-60':0,'61-90':0,'90+':0,t:0,mx:0,n:0};
    o[ageOf(s.date)]+=balOf(s);o.t+=balOf(s);o.n++;o.mx=Math.max(o.mx,dd(s.date,TODAY));M.set(s.cust,o);});
  const bad=G['90+'].reduce((a,s)=>a+balOf(s),0);
  b.innerHTML=`${bad>0?`<div class="al e">90일 초과 악성채권 <b>${w(bad)}원</b> (${G['90+'].length}건 · 미수의 ${(bad/tot*100).toFixed(0)}%) — 회수 조치 필요</div>`:''}
  <div class="g5 mb">
    ${Object.entries(G).map(([k,v],i)=>`<div class="k ${i===0?'g':i===1?'w':'r'}" onclick="drill('${k}일 미수',SV.filter(s=>isOpen(s)&&ageOf(s.date)==='${k}'))">
      <div class="l">${k}일</div><div class="v">${e(v.reduce((a,s)=>a+balOf(s),0))}<u>원</u></div>
      <div class="d">${v.length}건 · ${(v.reduce((a,s)=>a+balOf(s),0)/tot*100).toFixed(0)}%</div></div>`).join('')}
    <div class="k n"><div class="l">총 미수</div><div class="v">${e(tot)}<u>원</u></div><div class="d">${U.length}건 · ${M.size}개사</div></div>

    <div style="display:flex;height:24px;border-radius:2px;overflow:hidden">
    ${Object.entries(G).map(([k,v])=>{const p=v.reduce((a,s)=>a+balOf(s),0)/tot*100;

        color:#fff;font:700 9px var(--mono)">${p>6?p.toFixed(0)+'%':''}</i>`:'';}).join('')}</div>
    <div class="lg">${Object.entries(G).map(([k,v])=>`<span><i style="background:${AGC[k]}"></i>${k}일 ${e(v.reduce((a,s)=>a+balOf(s),0))}</span>`).join('')}</div>
  </div></div>
  <div class="box"><h2>거래처별 미수<span class="tg">잔액 큰 순</span></h2><div class="bd p0"><div class="sc h2">
    <table class="t"><thead><tr><th>거래처</th><th>지역</th><th class="n">건수</th><th class="n">0-30</th><th class="n">31-60</th>
      <th class="n">61-90</th><th class="n">90일+</th><th class="n">미수합계</th><th class="n">최장경과</th><th>위험도</th><th class="c">조치</th></tr></thead>

      ${['0-30','31-60','61-90','90+'].map(k=>`<td class="n ${o[k]?'':'dim'}">${o[k]?w(o[k]):'·'}</td>`).join('')}

    </tbody></table></div></div></div>`;

  $('#wd').innerHTML=`<svg class="ch" viewBox="0 0 970 500" style="min-width:970px">${d}</svg>`;
};

(function(){
  const ds=SV.map(s=>s.date).sort();
  $('#f1').value=ds[0];$('#f2').value=TODAY;
  $$('.thm b').forEach(el=>{el.onclick=()=>{
    THEME=el.dataset.t;document.documentElement.dataset.theme=THEME;
    $$('.thm b').forEach(x=>x.classList.toggle('on',x.dataset.t===THEME));
    P.render();};});
  $$('.thm b')[0].classList.add('on');
  $$('.per button').forEach(el=>{el.onclick=()=>{
    $$('.per button').forEach(x=>x.classList.remove('on'));el.classList.add('on');
    const p=el.dataset.p,y=TODAY.slice(0,4),m=TODAY.slice(5,7);
    if(p==='m'){$('#f1').value=`${y}-${m}-01`;$('#f2').value=TODAY;}
    else if(p==='q'){const q=Math.floor((+m-1)/3)*3+1;$('#f1').value=`${y}-${String(q).padStart(2,'0')}-01`;$('#f2').value=TODAY;}
    else if(p==='y'){$('#f1').value=`${y}-01-01`;$('#f2').value=TODAY;}
    else{$('#f1').value=ds[0];$('#f2').value=TODAY;}
    P.render();};});
  $('#f1').onchange=$('#f2').onchange=()=>P.render();
  document.onkeydown=ev=>{
    if(ev.key==='F2'){ev.preventDefault();P.render();toast('조회 완료');}
    if(ev.key==='F8'){ev.preventDefault();if(CUR==='sale')saleSave();}
    if(ev.key==='F9'){ev.preventDefault();if(CUR==='sale')lnAdd();else P.open('sale');}
    if(ev.ctrlKey&&ev.key==='k'){ev.preventDefault();P.open('slist');setTimeout(()=>$('#q')?.focus(),50);}
    if(ev.key==='Escape')P.close();};
  P.open('dash');
})();
